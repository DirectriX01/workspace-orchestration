[alembic]
script_location = migrations
# Prepend the project root to sys.path so `alembic upgrade head`, invoked via
# the console entrypoint (e.g. in the docker-compose api command), can import
# the `app` package from migrations/env.py. Without this, the CWD is not on
# sys.path and env.py raises ModuleNotFoundError: No module named 'app'.
prepend_sys_path = .
# The database URL is injected at runtime by migrations/env.py from
# app.config.get_settings().sync_database_url, so it is left blank here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
